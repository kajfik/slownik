<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Słownik</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f5f5f0;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-size: 2.8rem;
      font-weight: 700;
      letter-spacing: -1px;
      color: #1a1a1a;
    }

    header p {
      margin-top: 0.4rem;
      color: #666;
      font-size: 0.95rem;
    }

    .search-box {
      width: 100%;
      max-width: 640px;
      display: flex;
      gap: 0.5rem;
    }

    .search-box input {
      flex: 1;
      padding: 0.75rem 1rem;
      font-size: 1.05rem;
      border: 2px solid #ccc;
      border-radius: 8px;
      outline: none;
      font-family: 'Courier New', monospace;
      background: #fff;
      transition: border-color 0.15s;
    }

    .search-box input:focus {
      border-color: #4a7cf7;
    }

    .search-box input.error {
      border-color: #e53e3e;
    }

    .search-box button {
      padding: 0.75rem 1.4rem;
      font-size: 1rem;
      background: #4a7cf7;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.15s;
      white-space: nowrap;
    }

    .search-box button:hover:not(:disabled) {
      background: #2f5fd4;
    }

    .search-box button:disabled {
      background: #a0aec0;
      cursor: not-allowed;
    }

    .options {
      width: 100%;
      max-width: 640px;
      display: flex;
      gap: 1.5rem;
      margin-top: 0.75rem;
      flex-wrap: wrap;
    }

    .options label {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.9rem;
      color: #444;
      cursor: pointer;
      user-select: none;
    }

    .options input[type="checkbox"] {
      width: 16px;
      height: 16px;
      cursor: pointer;
      accent-color: #4a7cf7;
    }

    .status {
      width: 100%;
      max-width: 640px;
      margin-top: 1.25rem;
      min-height: 1.4rem;
      font-size: 0.9rem;
      color: #555;
    }

    .status.error-msg {
      color: #e53e3e;
    }

    .results {
      width: 100%;
      max-width: 640px;
      margin-top: 0.5rem;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      overflow: hidden;
    }

    .results-inner {
      max-height: 60vh;
      overflow-y: auto;
    }

    .results-inner::-webkit-scrollbar { width: 6px; }
    .results-inner::-webkit-scrollbar-track { background: transparent; }
    .results-inner::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }

    /* Groups */
    .group {
      border-bottom: 1px solid #ebebeb;
    }

    .group:last-child {
      border-bottom: none;
    }

    .group > summary {
      position: sticky;
      top: 0;
      z-index: 1;
      padding: 0.55rem 1rem 0.55rem 0.75rem;
      cursor: pointer;
      font-size: 0.88rem;
      color: #555;
      user-select: none;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: #fff;
    }

    .group > summary::-webkit-details-marker { display: none; }

    .group > summary::before {
      content: '▶';
      font-size: 0.6rem;
      color: #bbb;
      flex-shrink: 0;
      transition: transform 0.12s;
    }

    .group[open] > summary::before {
      transform: rotate(90deg);
    }

    .group > summary:hover {
      background: #f7f7f7;
    }

    .next-group-peek {
      position: sticky;
      bottom: 0;
      z-index: 1;
      padding: 0.55rem 1rem 0.55rem 0.75rem;
      cursor: pointer;
      font-size: 0.88rem;
      color: #555;
      user-select: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: #fff;
      border-top: 1px solid #ebebeb;
    }

    .next-group-peek::before {
      content: '▶';
      font-size: 0.6rem;
      color: #bbb;
      flex-shrink: 0;
    }

    .next-group-peek:hover {
      background: #f7f7f7;
    }

    .group-label {
      font-family: 'Courier New', monospace;
      flex: 1;
    }

    .group-count {
      font-size: 0.78rem;
      color: #bbb;
    }

    .group-words {
      border-top: 1px solid #f0f0f0;
    }

    .word {
      padding: 0.45rem 1.2rem;
      font-size: 1rem;
      border-bottom: 1px solid #f0f0f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    .word:last-child { border-bottom: none; }

    .word mark {
      background: #fef08a;
      color: inherit;
      border-radius: 2px;
      padding: 0 1px;
    }

    .loading {
      text-align: center;
      padding: 2rem;
      color: #888;
      font-size: 0.95rem;
    }

    .empty {
      text-align: center;
      padding: 2rem;
      color: #999;
      font-size: 0.95rem;
    }

    /* Pagination */
    .pagination {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 0.5rem;
      padding: 0.65rem 1rem;
      border-top: 1px solid #f0f0f0;
      background: #fafafa;
    }

    .pagination-buttons {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .pagination button {
      padding: 0.3rem 0.7rem;
      font-size: 0.85rem;
      background: #4a7cf7;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.15s;
    }

    .pagination button:hover:not(:disabled) {
      background: #2f5fd4;
    }

    .pagination button:disabled {
      background: #c8d3e8;
      cursor: not-allowed;
    }

    .page-select {
      font-size: 0.82rem;
      font-family: 'Courier New', monospace;
      padding: 0.28rem 0.5rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #fff;
      color: #333;
      cursor: pointer;
      width: 100%;
    }

    .page-select:focus {
      outline: none;
      border-color: #4a7cf7;
    }
  </style>
</head>
<body>
  <header>
    <h3>Wyszukiwanie słów za pomocą wyrażeń regularnych</h3>
  </header>

  <div class="search-box">
    <input
      type="text"
      id="pattern"
      placeholder="np. ^przy, nik$, .*acja.*"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
      spellcheck="false"
    >
    <button id="searchBtn" disabled>Szukaj</button>
  </div>

  <div class="options">
    <label>
      <input type="checkbox" id="fullMatch">
      Dopasowanie pełnego słowa
    </label>
    <label>
      <input type="checkbox" id="baseOnly">
      Tylko formy podstawowe
    </label>
  </div>

  <div class="status" id="status">Ładowanie słownika…</div>

  <div class="results" id="resultsBox" style="display:none;">
    <div class="results-inner" id="resultsList"></div>
    <div class="pagination" id="pagination" style="display:none;">
      <select class="page-select" id="pageSelect"></select>
      <div class="pagination-buttons">
        <button id="firstBtn" title="Cofnij o 10 stron">« −10</button>
        <button id="prevBtn" title="Poprzednia strona">‹ Poprzednia</button>
        <button id="nextBtn" title="Następna strona">Następna ›</button>
        <button id="lastBtn" title="Przejdź o 10 stron do przodu">+10 »</button>
      </div>
    </div>
  </div>

  <script>
    const WORDS_PER_GROUP = 50;
    const GROUPS_PER_PAGE = 10;

    let allWords = [];
    let baseWords = [];
    let words = [];
    let allLoaded = false;
    let baseLoaded = false;
    let allMatched = [];
    let hlRe = null;
    let currentPage = 0;

    const patternInput = document.getElementById('pattern');
    const searchBtn = document.getElementById('searchBtn');
    const statusEl = document.getElementById('status');
    const resultsBox = document.getElementById('resultsBox');
    const resultsList = document.getElementById('resultsList');
    const paginationEl = document.getElementById('pagination');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const firstBtn = document.getElementById('firstBtn');
    const lastBtn = document.getElementById('lastBtn');
    const pageSelect = document.getElementById('pageSelect');
    const fullMatchChk = document.getElementById('fullMatch');
    const baseOnlyChk = document.getElementById('baseOnly');

    function loadGzWordList(url) {
      return fetch(url)
        .then(r => {
          if (!r.ok) throw new Error(`HTTP ${r.status}`);
          const ds = new DecompressionStream('gzip');
          return new Response(r.body.pipeThrough(ds)).text();
        })
        .then(text => text.split('\n').map(w => w.trim()).filter(Boolean));
    }

    function updateActiveWordList() {
      if (baseOnlyChk.checked && baseLoaded) {
        words = baseWords;
      } else {
        words = allWords;
      }
    }

    function showLoadStatus() {
      const parts = [];
      if (allLoaded) parts.push(`${allWords.length.toLocaleString('pl-PL')} słów`);
      if (baseLoaded) parts.push(`${baseWords.length.toLocaleString('pl-PL')} form podstawowych`);
      if (parts.length > 0) {
        statusEl.textContent = `Załadowano ${parts.join(', ')}.`;
        statusEl.className = 'status';
      }
    }

    // Load both word lists in parallel
    loadGzWordList('slowa.gz')
      .then(list => {
        allWords = list;
        allLoaded = true;
        updateActiveWordList();
        searchBtn.disabled = false;
        showLoadStatus();
        if (patternInput.value.trim()) search();
      })
      .catch(err => {
        statusEl.textContent = `Błąd ładowania słownika: ${err.message}`;
        statusEl.className = 'status error-msg';
      });

    loadGzWordList('slowa_base.gz')
      .then(list => {
        baseWords = list;
        baseLoaded = true;
        updateActiveWordList();
        showLoadStatus();
        if (patternInput.value.trim()) search();
      })
      .catch(err => {
        // Base list is optional — just disable the checkbox
        baseOnlyChk.disabled = true;
        baseOnlyChk.parentElement.style.opacity = '0.5';
        baseOnlyChk.parentElement.title = 'Nie udało się załadować listy form podstawowych';
      });

    function search() {
      if (!allLoaded) return;
      const raw = patternInput.value;
      if (!raw) {
        statusEl.textContent = `Załadowano ${words.length.toLocaleString('pl-PL')} słów.`;
        statusEl.className = 'status';
        resultsBox.style.display = 'none';
        patternInput.classList.remove('error');
        return;
      }

      let pattern = raw;
      if (fullMatchChk.checked) {
        pattern = `^(?:${raw})$`;
      }

      let re;
      try {
        re = new RegExp(pattern, 'iu');
        patternInput.classList.remove('error');
      } catch (e) {
        statusEl.textContent = `Nieprawidłowe wyrażenie regularne: ${e.message}`;
        statusEl.className = 'status error-msg';
        patternInput.classList.add('error');
        resultsBox.style.display = 'none';
        return;
      }

      allMatched = words.filter(w => re.test(w));
      const count = allMatched.length;

      statusEl.textContent = count === 0
        ? 'Brak wyników.'
        : `Znaleziono ${count.toLocaleString('pl-PL')} ${pluralSlowa(count)}.`;
      statusEl.className = 'status';

      if (count === 0) {
        resultsBox.style.display = 'none';
        return;
      }

      try {
        hlRe = new RegExp(raw, 'giu');
      } catch {
        hlRe = null;
      }

      currentPage = 0;
      renderPage();
      resultsBox.style.display = '';
    }

    function renderPage() {
      // Build groups
      const groups = [];
      for (let i = 0; i < allMatched.length; i += WORDS_PER_GROUP) {
        groups.push(allMatched.slice(i, i + WORDS_PER_GROUP));
      }

      const totalPages = Math.ceil(groups.length / GROUPS_PER_PAGE);
      const pageGroups = groups.slice(
        currentPage * GROUPS_PER_PAGE,
        (currentPage + 1) * GROUPS_PER_PAGE
      );
      const singleGroup = groups.length === 1;

      let html = '';
      for (const group of pageGroups) {
        const first = escapeHtml(group[0]);
        const last = escapeHtml(group[group.length - 1]);
        const openAttr = singleGroup ? ' open' : '';
        html += `<details class="group"${openAttr}>`;
        html += `<summary><span class="group-label">${first} — ${last}</span></summary>`;
        html += `<div class="group-words">`;
        for (const w of group) {
          const safe = escapeHtml(w);
          let content = safe;
          if (hlRe) {
            hlRe.lastIndex = 0;
            content = safe.replace(hlRe, m => `<mark>${m}</mark>`);
          }
          html += `<div class="word">${content}</div>`;
        }
        html += `</div></details>`;
      }

      resultsList.innerHTML = html;
      resultsList.scrollTop = 0;
      updateNextGroupPeek();

      if (totalPages > 1) {
        paginationEl.style.display = '';
        const wordsPerPage = GROUPS_PER_PAGE * WORDS_PER_GROUP;
        pageSelect.innerHTML = '';
        for (let p = 0; p < totalPages; p++) {
          const firstWord = escapeHtml(allMatched[p * wordsPerPage]);
          const lastWord = escapeHtml(allMatched[Math.min((p + 1) * wordsPerPage - 1, allMatched.length - 1)]);
          const opt = document.createElement('option');
          opt.value = p;
          opt.textContent = `${p + 1} / ${totalPages}  (${firstWord} — ${lastWord})`;
          if (p === currentPage) opt.selected = true;
          pageSelect.appendChild(opt);
        }
        prevBtn.disabled = currentPage === 0;
        nextBtn.disabled = currentPage === totalPages - 1;
        firstBtn.disabled = currentPage < 10;
        lastBtn.disabled = currentPage >= totalPages - 10;
      } else {
        paginationEl.style.display = 'none';
      }
    }

    prevBtn.addEventListener('click', () => {
      if (currentPage > 0) { currentPage--; renderPage(); }
    });

    nextBtn.addEventListener('click', () => {
      const totalPages = Math.ceil(Math.ceil(allMatched.length / WORDS_PER_GROUP) / GROUPS_PER_PAGE);
      if (currentPage < totalPages - 1) { currentPage++; renderPage(); }
    });

    firstBtn.addEventListener('click', () => {
      if (currentPage >= 10) { currentPage -= 10; renderPage(); }
    });

    lastBtn.addEventListener('click', () => {
      const totalPages = Math.ceil(Math.ceil(allMatched.length / WORDS_PER_GROUP) / GROUPS_PER_PAGE);
      if (currentPage < totalPages - 10) { currentPage += 10; renderPage(); }
      else if (currentPage < totalPages - 1) { currentPage = totalPages - 1; renderPage(); }
    });

    pageSelect.addEventListener('change', () => {
      currentPage = parseInt(pageSelect.value, 10);
      renderPage();
    });

    function pluralSlowa(n) {
      if (n === 1) return 'słowo';
      const mod10 = n % 10, mod100 = n % 100;
      if (mod10 >= 2 && mod10 <= 4 && !(mod100 >= 12 && mod100 <= 14)) return 'słowa';
      return 'słów';
    }

    function escapeHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function updateNextGroupPeek() {
      resultsList.querySelectorAll('.next-group-peek').forEach(el => el.remove());
      const groups = resultsList.querySelectorAll('.group');
      groups.forEach((group, i) => {
        if (group.open && i + 1 < groups.length) {
          const nextGroup = groups[i + 1];
          const nextLabel = nextGroup.querySelector('.group-label').textContent;
          const peek = document.createElement('div');
          peek.className = 'next-group-peek';
          peek.innerHTML = `<span class="group-label">${escapeHtml(nextLabel)}</span>`;
          peek.addEventListener('click', () => {
            group.open = false;
            nextGroup.open = true;
            updateNextGroupPeek();
            const rect = nextGroup.getBoundingClientRect();
            const containerRect = resultsList.getBoundingClientRect();
            resultsList.scrollTop += rect.top - containerRect.top;
          });
          group.appendChild(peek);
        }
      });
    }

    resultsList.addEventListener('toggle', updateNextGroupPeek, true);

    searchBtn.addEventListener('click', search);
    patternInput.addEventListener('keydown', e => { if (e.key === 'Enter') search(); });
    fullMatchChk.addEventListener('change', () => { if (patternInput.value) search(); });
    baseOnlyChk.addEventListener('change', () => {
      updateActiveWordList();
      if (patternInput.value) search();
    });
  </script>
</body>
</html>
